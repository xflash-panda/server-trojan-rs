name: CI

on:
  push:
    branches: [ "master", "dev/master" ]
  pull_request:
    branches: [ "master", "dev/master" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout server-panel-rs
        uses: actions/checkout@v4
        with:
          repository: xflash-panda/server-panel-rs
          token: ${{ secrets.GIT_PAT }}
          path: ../server-panel-rs

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.GIT_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo check
        run: cargo check --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout server-panel-rs
        uses: actions/checkout@v4
        with:
          repository: xflash-panda/server-panel-rs
          token: ${{ secrets.GIT_PAT }}
          path: ../server-panel-rs

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.GIT_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout server-panel-rs
        uses: actions/checkout@v4
        with:
          repository: xflash-panda/server-panel-rs
          token: ${{ secrets.GIT_PAT }}
          path: ../server-panel-rs

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.GIT_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-targets
